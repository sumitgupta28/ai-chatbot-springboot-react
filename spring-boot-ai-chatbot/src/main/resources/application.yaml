spring:
  application:
    name: "Spring Boot ChatBot"
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    model:
      chat: ollama
    ollama:
      base-url: "http://localhost:11434"
      chat:
        options:
          model: "llama3.2"
          temperature: 0.7
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 384

app:
  rag:
    mode: soft                 # 'soft' = fallback to general knowledge | 'strict' = docs only
    top-k: 5
    similarity-threshold: 0.7

logging:
  level:
    in.ai.chatbot: DEBUG
