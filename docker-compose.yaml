version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_DB=ragdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  chatbot-backend:
    build:
      context: ./chatbot-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-sonnet-4-6}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@pgvector:5432/ragdb
      DATABASE_SYNC_URL: postgresql+psycopg2://postgres:postgres@pgvector:5432/ragdb
    depends_on:
      pgvector:
        condition: service_healthy
    networks:
      - app-network

  react-ui:
    build:
      context: ./chatbot-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgvector_data:
