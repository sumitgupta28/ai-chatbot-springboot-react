name: Claude PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          DIFF_SIZE=$(wc -c < pr.diff)
          echo "diff_size=${DIFF_SIZE}" >> $GITHUB_OUTPUT
          echo "PR diff size: ${DIFF_SIZE} bytes"

      - name: Set up Python
        if: steps.diff.outputs.diff_size != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install anthropic SDK
        if: steps.diff.outputs.diff_size != '0'
        run: pip install anthropic --quiet

      - name: Run Claude review
        if: steps.diff.outputs.diff_size != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 tools/claude_review.py "$(cat pr.diff)" > review.md

      - name: Post review comment
        if: steps.diff.outputs.diff_size != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: `> 🤖 **Automated review by Claude** (claude-haiku-4-5)\n\n${review}`,
              event: 'COMMENT'
            });

      - name: Skip notice (empty diff)
        if: steps.diff.outputs.diff_size == '0'
        run: echo "Empty diff — skipping review."
